services:
  db:
    image: postgres:17-alpine
    container_name: markwork_db
    environment:
      POSTGRES_USER: markwork
      POSTGRES_PASSWORD: markwork_secret
      POSTGRES_DB: markwork_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - markwork_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U markwork -d markwork_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: markwork_backend
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - markwork_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: markwork_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - markwork_net

volumes:
  postgres_data:


networks:
  markwork_net:
    driver: bridge
