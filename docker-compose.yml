services:
  db:
    image: postgres:17-alpine
    container_name: markwork_db
    env_file:
      - backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - markwork_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: markwork_backend
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - markwork_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: markwork_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    env_file:
      - frontend/.env
    depends_on:
      - backend
    networks:
      - markwork_net

volumes:
  postgres_data:


networks:
  markwork_net:
    driver: bridge
