<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markwork</title>
    <script>
      try {
        var stored = JSON.parse(localStorage.getItem('markwork-theme') || '{}');
        if (stored.state && stored.state.mode === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      } catch(e) {}
    </script>
    <style>
      html[data-theme="dark"] { background: #1a1816; }
      html:not([data-theme="dark"]) { background: #fdfcf8; }
    </style>
    <script src="https://accounts.google.com/gsi/client" async></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
